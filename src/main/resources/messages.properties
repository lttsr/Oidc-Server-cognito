# レート制限メッセージ
rate.limit.exceeded= リクエスト回数が制限を超えています。しばらく時間をおいてから再度お試しください。

# ユーザープールコンテキストメッセージ
userpool.context.error.invalid=ユーザープールの取得時に予期せぬエラーが発生しました。
userpool.context.error.not_found=ユーザープール情報が正しくありません。再度お試しください。
# エンコードエラーメッセージ
encode.base64=Base64エンコード処理に失敗しました。

# JWT検証メッセージ
jwt.verification.error.failed=セッションの検証に失敗しました。再度ログインしてください。

# 認証エラーメッセージ
validation.error.invalid_credentials=ユーザープール情報、もしくはユーザー名かパスワードが間違っています。

# AWS Cognito例外
# ForbiddenException
cognito.error.forbidden=アクセスが許可されていません。
# InternalErrorException
cognito.error.internal_error=認証処理中に予期せぬエラーが発生しました。管理者にお問い合わせください。
# UserNotConfirmedException
cognito.error.user_not_confirmed=指定されたユーザは確認できませんでした。管理者にお問い合わせください。
# UserNotFoundException
cognito.error.user_not_found=指定されたユーザーは存在しません。
# InvalidParameterException
cognito.error.invalid_parameter=入力パラメータが不正です。
# NotAuthorizedException
cognito.error.not_authorized=ユーザー名またはパスワードが正しくありません。
# CodeMismatchException
cognito.error.code_mismatch=認証コードが正しくありません。
# ExpiredCodeException
cognito.error.expired_code=認証コードの有効期限が切れています。再度認証を行ってください。
# InvalidUserPoolConfigurationException
cognito.error.invalid_user_pool=ユーザプールの設定が不正です。管理者にお問い合わせください。
# PasswordResetRequiredException
cognito.error.password_reset_required=パスワードのリセットが必要です。
# AliasExistsException
cognito.error.alias_exists=既に電話番号、メールアドレスは使用されています。
# CodeDeliveryFailureException
cognito.error.code_delivery_failure=認証コードの送信に失敗しました。管理者にお問い合わせください。
# InvalidPasswordException
cognito.error.invalid_password=パスワードが不正です。再度お試しください。
# PasswordHistoryPolicyViolationException
cognito.error.history_policy_violation=このパスワードは以前使用されたパスワードです。別のパスワードを入力してください。
# InvalidAttributeException
cognito.error.invalid.attribute=無効なユーザー属性です。
cognito.error.mutable.attribute=変更可能なユーザー属性ではありません。

# 500エラーメッセージ
error.500=予期せぬエラーが発生しました。システム管理者にお問い合わせください。
auth.init.invalid_access=認証開始URLからアクセスしてください。
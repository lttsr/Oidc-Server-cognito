# バリデーションメッセージ
validation.userName.NotBlank=ユーザー名は必須です
validation.password.NotBlank=パスワードは必須です
validation.userName.Size=ユーザー名は{min}文字以上{max}文字以内です
validation.password.Size=パスワードは{min}文字以上です

validation.session.NotBlank=セッションIDは必須です
validation.mfaCode.NotBlank=MFAコードは必須です
validation.mfaCode.Pattern=MFAコードは{regexp}である必要があります

# ユーザー属性バリデーションメッセージ
validation.userAttribute.required={0}は必須です
validation.userAttribute.email.invalid=メールアドレスの形式が不正です
validation.userAttribute.email.maxLength=メールアドレスは254文字以内で入力してください
validation.userAttribute.phoneNumber.invalid=電話番号はE.164形式で入力してください（例: +819012345678）
validation.userAttribute.name.noEnglish=名前に英語は使用できません
validation.userAttribute.name.maxLength=名前は100文字以内で入力してください
validation.userAttribute.familyName.maxLength=50文字以内で入力してください
validation.userAttribute.givenName.maxLength=50文字以内で入力してください
validation.userAttribute.birthdate.invalid=生年月日はYYYY-MM-DD形式で入力してください
validation.userAttribute.gender.invalid=性別はmale, female, otherのいずれかを指定してください

# 動的バリデーション（スキーマベース）
validation.userAttribute.string.minLength={0}は{1}文字以上で入力してください
validation.userAttribute.string.maxLength={0}は{1}文字以内で入力してください
validation.userAttribute.number.invalid={0}は数値で入力してください
validation.userAttribute.number.minValue={0}は{1}以上で入力してください
validation.userAttribute.number.maxValue={0}は{1}以下で入力してください
validation.userAttribute.datetime.invalid={0}は有効な日時形式で入力してください
validation.userAttribute.boolean.invalid={0}はtrueまたはfalseで入力してください

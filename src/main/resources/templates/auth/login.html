<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
    <div class="login-page">
        <div class="login-bg" aria-hidden="true"></div>

        <main class="login-card">
            <header class="login-card-header">
                <div class="login-card-logo">
                    <img th:if="${companyLogoPath}" th:src="@{${companyLogoPath}}" alt="企業ロゴ">
                </div>
                <h1 class="login-card-title">ログイン</h1>
                <p class="login-card-lead">認証情報を入力してください。</p>
            </header>

            <div th:if="${error}" class="error-message" role="alert" th:text="${error}"></div>

            <form method="post" action="/api/auth/login" th:object="${loginForm}" class="login-form">
                <input type="hidden" name="sessionId" th:value="${sessionId}">

                <div class="form-group">
                    <label for="user-pool-alias" class="form-label">ユーザープール</label>

                    <!-- 実際にフォーム送信される select（非表示） -->
                    <select id="user-pool-alias" name="userPoolAlias" class="native-select" required>
                        <option value="">選択してください</option>
                        <option th:each="userPool : ${user_pool_list}" th:value="${userPool.userPoolAlias}"
                            th:text="${userPool.userPoolAlias}">
                        </option>
                    </select>

                    <!-- 見た目用のカスタムセレクト -->
                    <div class="custom_select" data-target-id="user-pool-alias">
                        <button type="button" class="custom_select_trigger">
                            <span class="custom_select_label" data-placeholder="選択してください">選択してください</span>
                            <span class="custom_select_icon">▾</span>
                        </button>
                        <ul class="custom_select_list">
                            <li class="custom_select_option is_placeholder" data-value="">
                                選択してください
                            </li>
                            <li class="custom_select_option" th:each="userPool : ${user_pool_list}"
                                th:data-value="${userPool.userPoolAlias}" th:text="${userPool.userPoolAlias}">
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username" class="form-label">ユーザー名 または メールアドレス</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="ユーザー名を入力" required
                        minlength="8" maxlength="64" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">パスワード</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password" class="form-input" placeholder="パスワードを入力"
                            required minlength="8" maxlength="64" autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()"
                            aria-label="パスワード表示切替">表示</button>
                    </div>
                </div>

                <button type="submit" class="submit-button">ログイン</button>
            </form>
        </main>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleButton = document.querySelector('.password-toggle');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleButton.textContent = '非表示';
            } else {
                passwordInput.type = 'password';
                toggleButton.textContent = '表示';
            }
        }

        function setupCustomSelect() {
            const wrappers = document.querySelectorAll('.custom_select');

            wrappers.forEach(function (wrapper) {
                const targetId = wrapper.getAttribute('data-target-id');
                const nativeSelect = document.getElementById(targetId);
                const trigger = wrapper.querySelector('.custom_select_trigger');
                const label = wrapper.querySelector('.custom_select_label');
                const options = wrapper.querySelectorAll('.custom_select_option');

                trigger.addEventListener('click', function () {
                    const isOpen = wrapper.classList.contains('is_open');
                    document.querySelectorAll('.custom_select.is_open').forEach(function (open) {
                        open.classList.remove('is_open');
                    });
                    if (!isOpen) {
                        wrapper.classList.add('is_open');
                    }
                });

                options.forEach(function (opt) {
                    opt.addEventListener('click', function () {
                        const value = opt.getAttribute('data-value');
                        const text = opt.textContent.trim();

                        if (nativeSelect) {
                            nativeSelect.value = value;
                        }

                        label.textContent = text;
                        if (value) {
                            label.classList.remove('is_placeholder');
                        } else {
                            label.classList.add('is_placeholder');
                        }

                        wrapper.classList.remove('is_open');
                    });
                });
            });

            document.addEventListener('click', function (e) {
                if (!e.target.closest('.custom_select')) {
                    document.querySelectorAll('.custom_select.is_open').forEach(function (open) {
                        open.classList.remove('is_open');
                    });
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            setupCustomSelect();
            setupLoginFormValidation();
        });
    </script>
</body>

</html>
